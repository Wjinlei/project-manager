<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本地项目管理系统</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">PM</span>
        <span class="brand-text">项目面板</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <button class="nav-item active" data-page="dashboard">
          <span class="nav-icon">⌂</span>
          <span>首页</span>
        </button>
        <button class="nav-item" data-page="projects">
          <span class="nav-icon">▣</span>
          <span>项目管理</span>
        </button>
        <button class="nav-item" data-page="workflows">
          <span class="nav-icon">⇄</span>
          <span>流程编排</span>
        </button>
        <button class="nav-item" data-page="scheduler">
          <span class="nav-icon">◷</span>
          <span>计划任务</span>
        </button>
        <button class="nav-item" data-page="git">
          <span class="nav-icon">⑂</span>
          <span>Git</span>
        </button>
      </nav>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div class="topbar-title">
          <button class="sidebar-toggle" id="sidebarToggle" type="button">☰</button>
          <div>
            <h1 class="page-title" id="pageTitle">首页</h1>
            <p class="page-subtitle">本地项目统一管理面板</p>
          </div>
        </div>
        <div class="topbar-actions">
          <input class="form-control form-control-sm search-input" type="search" placeholder="搜索项目或功能">
          <span class="version-badge" id="versionBadge">v0.1.0</span>
        </div>
      </header>

      <section class="content-card" id="appContent"></section>
    </main>
  </div>

  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="./pages/projects.js"></script>
  <script src="./pages/workflows.js"></script>
  <script src="./js/router.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
